name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    uses: ./.github/workflows/zizmor.yml
  setup:
    name: asdf and Elixir dependencies
    timeout-minutes: 30
    runs-on: ubuntu-latest
    outputs:
      cache-key-asdf: ${{ steps.cache-keys.outputs.asdf }}
      cache-key-mix: ${{ steps.cache-keys.outputs.mix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set cache keys
        id: cache-keys
        run: |
          echo "asdf-restore=cache-asdf-" >> $GITHUB_OUTPUT
          echo "asdf=cache-asdf-${{ hashFiles('.tool-versions') }}" >> $GITHUB_OUTPUT
          echo "mix-restore=cache-mix-${{ hashFiles('.tool-versions') }}-" >> $GITHUB_OUTPUT
          echo "mix=cache-mix-${{ hashFiles('.tool-versions') }}-${{ hashFiles('**/mix.lock') }}" >> $GITHUB_OUTPUT
      - name: asdf cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.asdf
          key: ${{ steps.cache-keys.outputs.asdf }}
          restore-keys: ${{ steps.cache-keys.outputs.asdf-restore }}
        id: asdf-cache
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
        if: steps.asdf-cache.outputs.cache-hit != 'true'
      - name: Setup asdf environment
        uses: mbta/actions/reshim-asdf@2c88be6542aa1b129d6a273cae070af9b1e7c076 # v2.22
      - name: mix rebar and hex
        run: |
          mix local.rebar --force
          mix local.hex --force
        if: steps.asdf-cache.outputs.cache-hit != 'true'
      - name: Mix cache
        id: deps-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: ${{ steps.cache-keys.outputs.mix }}
          restore-keys: ${{ steps.cache-keys.outputs.mix-restore }}
      - name: Install and compile Mix dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          mix deps.get
          mix deps.compile
          MIX_ENV=test mix deps.compile

  build_elixir:
    name: Build and test Elixir
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: setup
    env:
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_NAME: mobile_app_backend_test
      DATABASE_DISABLE_SSL: insecure-yes
    services:
      postgres:
        image: postgres:18.4@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: ${{env.DATABASE_USER}}
          POSTGRES_PASSWORD: ${{env.DATABASE_PASSWORD}}
          POSTGRES_DB: ${{env.DATABASE_NAME}}
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: asdf cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.asdf
          key: ${{ needs.setup.outputs.cache-key-asdf }}
      - name: Setup asdf environment
        uses: mbta/actions/reshim-asdf@2c88be6542aa1b129d6a273cae070af9b1e7c076 # v2.22
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore Mix cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: ${{ needs.setup.outputs.cache-key-mix }}
      - name: Check elixir/erlang OTP version sync
        run: mix check_otp_sync
      - name: Compile (warnings as errors)
        run: mix compile --force --warnings-as-errors
      - name: Credo
        run: mix credo --strict
      - name: Check formatting
        run: mix format --check-formatted
      - name: Check gettext.extract
        run: mix gettext.extract --check-up-to-date
      - name: Run tests
        run: mix test --cover
      - name: Report test coverage
        # Disabled due to dependency issues
        if: false
        uses: mbta/github-actions-report-lcov@44a478dc20d1b62bf0f8f13951f3dc20bacbda19 # v4.0.1
        with:
          coverage-files: cover/lcov.info
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: mbta/actions/dialyzer@2c88be6542aa1b129d6a273cae070af9b1e7c076 # v2.22
      - name: Check for unused dependencies
        run: mix deps.unlock --check-unused

  docker_build:
    name: Check that the Docker container will build and run
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: docker build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha,scope=build-${{ github.ref_name }}
          cache-to: type=gha,scope=build-${{ github.ref_name }},mode=max
      - name: docker compose build
        run: docker compose build
      - name: docker compose up
        run: docker compose up --wait
        env:
          API_KEY: ${{secrets.API_KEY}}
          API_URL: ${{secrets.API_URL}}
      - name: ensure running properly
        run: docker compose exec --no-TTY mobile-app-backend wget --spider -S http://localhost:4000/
      - name: show docker container logs
        run: docker compose logs mobile-app-backend
        if: ${{ !cancelled() }}

  load_test:
    name: Check Python load tests for basic validity
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Read asdf versions
        id: asdf
        run: cat load_testing/.tool-versions | sed 's/ /=/' | tee -a "$GITHUB_OUTPUT"
      - name: Install poetry
        run: pipx install poetry==${STEPS_ASDF_OUTPUTS_POETRY}
        env:
          STEPS_ASDF_OUTPUTS_POETRY: ${{steps.asdf.outputs.poetry}}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{steps.asdf.outputs.python}}
          cache: poetry
          cache-dependency-path: load_testing/poetry.lock
      - run: cd load_testing && poetry install
      - run: cd load_testing && poetry run ruff check
      - run: cd load_testing && poetry run mypy locustfile.py
